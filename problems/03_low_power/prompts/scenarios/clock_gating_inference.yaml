name: "clock_gating_inference"
category: "low_power"
difficulty: "medium"

description: |
  Evaluate whether LLM can generate RTL that properly infers clock gating cells
  for power reduction.

prompt_template: |
  Design a low-power register file module with clock gating support.
  
  **Module Specification**:
  - Module name: `lp_register_file`
  - Parameters:
    - `DATA_WIDTH = 32`
    - `NUM_REGS = 16`
  - Ports:
    - `clk` - System clock
    - `rst_n` - Asynchronous reset (active low)
    - `wr_en` - Write enable
    - `wr_addr[3:0]` - Write address
    - `rd_addr1[3:0]`, `rd_addr2[3:0]` - Read addresses
    - `wr_data[DATA_WIDTH-1:0]` - Write data
    - `rd_data1[DATA_WIDTH-1:0]`, `rd_data2[DATA_WIDTH-1:0]` - Read data
    - `clk_gate_en` - Clock gating enable (when low, disables clock to register array)
  
  **Low-Power Requirements**:
  1. Implement clock gating for the register array
  2. Use proper coding style for automatic clock gating inference by synthesis tools
  3. Read ports should operate normally (combinational read)
  4. Write operation should be gated when `clk_gate_en` is low
  5. Include power intent comments for UPF/CPF awareness
  
  **Additional Information**:
  - Target technology: Standard cell library with integrated clock gating cells
  - Expected power savings: ~40% reduction in dynamic power when gated
  - The clock gate should be placed at the register file level
  
  Provide the complete synthesizable RTL with power intent comments.

system_prompt: |
  You are a low-power design expert. Write RTL that enables optimal clock gating 
  inference and includes power intent annotations.

variables:
  data_width: 32
  num_regs: 16

top_module: "lp_register_file"

expected_features:
  - "Clock gating enable logic"
  - "Separate always_ff block for gated clock domain"
  - "Read ports independent of clock gate"
  - "UPF/CPF awareness comments"

power_checks:
  - check: "clock_gating_inferred"
    metric: "CLK-GATE-EXISTS"
  - check: "gated_write_logic"
    metric: "CLK-GATE-EXISTS"
  - check: "power_intent_comments"
    metric: "UPF-AWARENESS"

golden_reference: |
  // Low-Power Register File with Clock Gating
  // Power Intent: Supports UPF with power domain "PD_CORE"
  //               Clock gate enable controls "CGE" signal
  
  module lp_register_file #(
      parameter DATA_WIDTH = 32,
      parameter NUM_REGS = 16,
      parameter ADDR_WIDTH = 4
  ) (
      input  logic                     clk,
      input  logic                     rst_n,
      input  logic                     wr_en,
      input  logic [ADDR_WIDTH-1:0]    wr_addr,
      input  logic [ADDR_WIDTH-1:0]    rd_addr1,
      input  logic [ADDR_WIDTH-1:0]    rd_addr2,
      input  logic [DATA_WIDTH-1:0]    wr_data,
      output logic [DATA_WIDTH-1:0]    rd_data1,
      output logic [DATA_WIDTH-1:0]    rd_data2,
      input  logic                     clk_gate_en  // UPF: maps to "CGE" port
  );
      
      // Register file storage
      logic [DATA_WIDTH-1:0] reg_array [NUM_REGS-1:0];
      
      // Internal gated clock enable
      logic gated_clk_en;
      
      // UPF: Isolation implied - outputs from this domain are isolated when powered down
      
      // Clock gating enable logic
      // Synthesis tool will infer integrated clock gating cell
      always_comb begin
          gated_clk_en = wr_en && clk_gate_en;
      end
      
      // Write operation with clock gating
      // The enable condition controls the clock gate
      always_ff @(posedge clk or negedge rst_n) begin
          if (!rst_n) begin
              // Reset condition (clears all registers)
              for (int i = 0; i < NUM_REGS; i++) begin
                  reg_array[i] <= '0;
              end
          end else if (gated_clk_en) begin
              // Write operation - clock is only active when enabled
              reg_array[wr_addr] <= wr_data;
          end
      end
      
      // Read operations - combinational (always active, no clock dependency)
      assign rd_data1 = reg_array[rd_addr1];
      assign rd_data2 = reg_array[rd_addr2];
      
      // UPF: Retention control would be added here for state retention
      // during power-down modes
      
  endmodule
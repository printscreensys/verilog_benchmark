name: "arbitration_round_robin"
category: "ip_integrate"
difficulty: "hard"

description: |
  Generate arbitration wrapper to connect three competing AXI-Stream masters 
  to a single AXI-Stream slave using round-robin arbitration.

prompt_template: |
  You are given three pre-verified AXI-Stream master IPs that need to share a single slave IP.
  
  **Master IP Interface (3 instances)**:
  ```systemverilog
  module axi_stream_master (
      input  logic        clk,
      input  logic        rst_n,
      output logic [31:0] tdata,
      output logic        tvalid,
      input  logic        tready,
      output logic        tlast,
      output logic [3:0]  tkeep,
      output logic        tstrb
  );
  ```
  
  **Slave IP Interface (1 instance)**:
  ```systemverilog
  module axi_stream_slave (
    input  logic        clk,
    input  logic        rst_n,
    input  logic [31:0] tdata,
    input  logic        tvalid,
    output logic        tready,
    input  logic        tlast,
    input  logic [3:0]  tkeep,
    input  logic        tstrb
  );
  ```

  **Task: Design axi_arbiter_wrapper that**:
  1. Instantiates three master IPs and one slave IP
  2. Implements fair round-robin arbitration between masters
  3. Properly handles backpressure (tready) propagation to selected master
  4. Ensures complete packet transmission before switching (no mid-packet arbitration)
  5. Maintains AXI-Stream protocol compliance

  **Constraints**:
  Packets are delineated by tlast signal
  Arbitration decision made only at packet boundaries
  Starvation-free round-robin scheduling
  Maximum arbitration latency: 2 cycles

  Provide complete synthesizable wrapper code.

system_prompt: |
  You are an expert in on-chip interconnect design. Generate efficient arbitration logic
  that maintains fairness and protocol compliance.

variables:
  num_masters: 3
  data_width: 32
  arbitration: "round_robin"
  
  top_module: "axi_arbiter_wrapper"

  golden_ips:

    name: "axi_stream_master"
    file: "axi_stream_master.v"
    instances: 3

    name: "axi_stream_slave"
    file: "axi_stream_slave.v"
    instances: 1

testbench: "testbenches/tb_axi_arbiter.sv"

evaluation:
  metrics:
    # "INTEG-PASS",
    # "LATENCY-OVERHEAD",
    # "AREA-EFF",
    # "FAIRNESS-SCORE"

  pass_condition: "INTEG-PASS == true AND FAIRNESS-SCORE >= 0.9"

  expected_features:
    "Round-robin state machine"
    # "Packet boundary detection using tlast"
    # "Multiplexer for data/control signals"
    # "Grant lock until tlast"

  golden_reference: |
    module axi_arbiter_wrapper (
      input logic clk,
      input logic rst_n
    );

    localparam NUM_MASTERS = 3;

    // Master interfaces
    logic [NUM_MASTERS-1:0][31:0] m_tdata;
    logic [NUM_MASTERS-1:0] m_tvalid;
    logic [NUM_MASTERS-1:0] m_tready;
    logic [NUM_MASTERS-1:0] m_tlast;
    logic [NUM_MASTERS-1:0][3:0] m_tkeep;
    logic [NUM_MASTERS-1:0] m_tstrb;

    // Slave interface
    logic [31:0] s_tdata;
    logic s_tvalid;
    logic s_tready;
    logic s_tlast;
    logic [3:0] s_tkeep;
    logic s_tstrb;

    // Arbitration signals
    logic [1:0] grant, next_grant;
    logic grant_valid;
    logic packet_in_progress;

    // Generate master instances
    genvar i;
    generate
      for (i = 0; i < NUM_MASTERS; i++) begin : masters
        axi_stream_master u_master (
          .clk (clk),
          .rst_n (rst_n),
          .tdata (m_tdata[i]),
          .tvalid (m_tvalid[i]),
          .tready (m_tready[i]),
          .tlast (m_tlast[i]),
          .tkeep (m_tkeep[i]),
          .tstrb (m_tstrb[i])
        );
      end
    endgenerate

    // Slave instance
    axi_stream_slave u_slave (
      .clk (clk),
      .rst_n (rst_n),
      .tdata (s_tdata),
      .tvalid (s_tvalid),
      .tready (s_tready),
      .tlast (s_tlast),
      .tkeep (s_tkeep),
      .tstrb (s_tstrb)
    );

    // Round-robin arbitration FSM
    always_ff @(posedge clk or negedge rst_n) begin
      if (!rst_n) begin
        grant <= 2'b00;
        packet_in_progress <= 1'b0;
      end else begin
          if (!packet_in_progress) begin
            grant <= next_grant;
          end

          if (s_tvalid && s_tready) begin
            packet_in_progress <= !s_tlast;
          end
      end
    end

        // Next grant calculation (round-robin)
    always_comb begin
      next_grant = grant;
          if (!packet_in_progress) begin
            for (int j = 1; j <= NUM_MASTERS; j++) begin
              automatic logic [1:0] candidate = (grant + j) % NUM_MASTERS;
              if (m_tvalid[candidate]) begin
                next_grant = candidate;
                break;
          end
        end
      end
    end

    // Grant valid signal
    assign grant_valid = packet_in_progress ? 1'b1 : m_tvalid[grant];

    // Multiplexer for slave interface
    assign s_tdata = m_tdata[grant];
    assign s_tvalid = grant_valid;
    assign s_tlast = m_tlast[grant];
    assign s_tkeep = m_tkeep[grant];
    assign s_tstrb = m_tstrb[grant];

    // Demultiplexer for ready signal
    always_comb begin
      for (int i = 0; i < NUM_MASTERS; i++) begin
        m_tready[i] = 1'b0;
      end
      m_tready[grant] = s_tready;
    end

    endmodule
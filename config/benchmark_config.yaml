# Global benchmark configuration

execution:
  parallel_workers: 4          # Number of concurrent LLM calls
  timeout_per_prompt: 120      # Seconds
  retry_attempts: 3
  retry_delay: 5               # Seconds

simulation:
  verilator:
    binary: "verilator"
    flags: "--lint-only -Wall -Wno-DECLFILENAME -Wno-UNUSED"
  iverilog:
    binary: "iverilog"
    flags: "-g2012 -Wall"
  vvp:
    binary: "vvp"
  simulation_timeout: 60       # Seconds per testbench run

synthesis:
  yosys:
    binary: "yosys"
    tech_lib: "cmos"           # or "generic"

tool_availability:             # Fallback behavior
  prefer_opensource: true
  commercial_tools:
    spyglass: false            # Set to true if license available
    questa_cdc: false
    conformal_lp: false

logging:
  level: "INFO"
  save_llm_responses: true
  save_waveforms_on_failure: true
  max_waveform_size_mb: 100

metrics:
  aggregation: "mean"          # "mean" or "median"
  normalize_scores: true       # Scale 0-100 across all models